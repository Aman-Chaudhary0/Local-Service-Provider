services:

  # container for backend
  backend:

  # build docker image
    build:
      context: ./backend
    container_name: local-service-backend
    restart: unless-stopped

    working_dir: /app
    env_file:
      - ./backend/.env

      # run backend in dev mode
    command: npm run dev -- --legacy-watch
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
# build image for frontend
  frontend:
    build:
      context: ./frontend
    container_name: local-service-frontend
    restart: unless-stopped

    # ensure backend runs first
    depends_on:
      - backend
    working_dir: /app

    # fixes docker watches issues
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules


# create image for admin
  admin:
    build:
      context: ./admin
    container_name: local-service-admin
    restart: unless-stopped
    depends_on:
      - backend
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: npm run dev -- --host 0.0.0.0 --port 5174
    ports:
      - "5174:5174"
    volumes:
      - ./admin:/app
      - admin_node_modules:/app/node_modules

# volumes to store data
volumes:
  backend_node_modules:
  frontend_node_modules:
  admin_node_modules:
